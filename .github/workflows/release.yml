name: Release & Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Version from gradle.properties
        id: version
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "gradle"

      - name: Build All Subprojects
        run: chmod +x gradlew && ./gradlew build

      - name: Publish Spigot Plugin
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # --- Modrinth ---
          modrinth-id: TuwgoQcx
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # --- CurseForge ---
          curseforge-id: 1587714
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          # --- GitHub Releases (only on release events) ---
          github-token: ${{ github.event_name == 'release' && secrets.GITHUB_TOKEN || '' }}

          # --- Spigot Artifact ---
          files: |
            spigot/build/libs/DiscordCraft-Spigot-*.jar

          # --- Metadata ---
          name: "DiscordCraft Spigot ${{ github.event.release.tag_name || steps.version.outputs.version }}"
          version: ${{ github.event.release.tag_name || steps.version.outputs.version }}
          version-type: release
          changelog-file: RELEASE_NOTES.md
          loaders: |
            spigot
            paper
            purpur
          game-versions: |
            >=1.20.5

      - name: Publish NeoForge Mod
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # --- Modrinth ---
          modrinth-id: TuwgoQcx
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # --- CurseForge ---
          curseforge-id: 1587714
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          # --- GitHub Releases (only on release events) ---
          github-token: ${{ github.event_name == 'release' && secrets.GITHUB_TOKEN || '' }}

          # --- NeoForge Artifact ---
          files: |
            neoforge/build/libs/DiscordCraft-NeoForge-*.jar

          # --- Metadata ---
          name: "DiscordCraft NeoForge ${{ github.event.release.tag_name || steps.version.outputs.version }}"
          version: ${{ github.event.release.tag_name || steps.version.outputs.version }}
          version-type: release
          changelog-file: RELEASE_NOTES.md
          loaders: |
            neoforge
          game-versions: |
            >=1.20.5
