name: Release & Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "gradle"

      - name: Build All Subprojects
        run: chmod +x gradlew && ./gradlew build

      - name: Publish Spigot Plugin
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # --- GitHub Releases ---
          github-token: ${{ secrets.GITHUB_TOKEN }}

          # --- Modrinth ---
          modrinth-id: discordcraft
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # --- CurseForge ---
          curseforge-id: 1587714
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          # --- Spigot Artifact ---
          files: |
            spigot/build/libs/DiscordCraft-Spigot-*.jar

          # --- Metadata ---
          name: "DiscordCraft Spigot ${{ github.event.release.tag_name }}"
          version: ${{ github.event.release.tag_name }}
          version-type: release
          loaders: |
            spigot
            paper
            purpur

      - name: Publish NeoForge Mod
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # --- GitHub Releases ---
          github-token: ${{ secrets.GITHUB_TOKEN }}

          # --- Modrinth ---
          modrinth-id: discordcraft
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # --- CurseForge ---
          curseforge-id: 1587714
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          # --- NeoForge Artifact ---
          files: |
            neoforge/build/libs/DiscordCraft-NeoForge-*.jar

          # --- Metadata ---
          name: "DiscordCraft NeoForge ${{ github.event.release.tag_name }}"
          version: ${{ github.event.release.tag_name }}
          version-type: release
          loaders: |
            neoforge
