name: Publish to Platforms

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (e.g., v1.0.0)"
        required: true
        type: string
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Determine Release Tag
        id: release
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.release_tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Publishing release: $TAG"

      - name: Download Release Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.release.outputs.tag }}" \
            --pattern "DiscordCraft-*.jar" \
            --dir ./artifacts

      - name: Download Release Notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ steps.release.outputs.tag }}" \
            --json body \
            --jq '.body' > ./RELEASE_NOTES.md

      - name: Publish Spigot Plugin
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # --- Modrinth ---
          modrinth-id: TuwgoQcx
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # --- CurseForge ---
          curseforge-id: 1587714
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          # --- Spigot Artifact ---
          files: |
            artifacts/DiscordCraft-Spigot-*.jar

          # --- Metadata ---
          name: "DiscordCraft Spigot ${{ steps.release.outputs.tag }}"
          version: ${{ steps.release.outputs.tag }}
          version-type: release
          changelog-file: RELEASE_NOTES.md
          loaders: |
            spigot
            paper
            purpur
          game-versions: |
            >=1.20.5

      - name: Publish NeoForge Mod
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # --- Modrinth ---
          modrinth-id: TuwgoQcx
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # --- CurseForge ---
          curseforge-id: 1587714
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          # --- NeoForge Artifact ---
          files: |
            artifacts/DiscordCraft-NeoForge-*.jar

          # --- Metadata ---
          name: "DiscordCraft NeoForge ${{ steps.release.outputs.tag }}"
          version: ${{ steps.release.outputs.tag }}
          version-type: release
          changelog-file: RELEASE_NOTES.md
          loaders: |
            neoforge
          game-versions: |
            >=1.20.5
