chat:
  minecraft-format: "[%guild% -> %channel%] &e<%username%> &f%message%&7%attachments%"
  minecraft-edited-format: "[%guild% -> %channel%] &e<%username%> &f%message%&7%attachments% &8&l(Edited)"
  attachment-spoiler: " (spoiler)"
  attachment-separator: ", "

commands:
  no-permission: "You don't have the required permissions to use this command!"
  disabled: "This command has been disabled by the server administrator."
  internal-error: "An internal error occurred while executing this command. Administrators have been notified."
  not-found: "Command not found. Use `/help` to see the available commands."
  main-guild-only: "This command can only be executed on the main server."
  invalid-subcommand: "Invalid subcommand. Use `/help` to see the available subcommands."

player:
  join:
    embed:
      title: "Player Joined"
      description: "**%player_name%** has joined the game!"
      color: "#2ECC71"
      thumbnail: "https://mc-heads.net/avatar/%player_name%/64"

  welcome:
    embed:
      title: "Welcome!"
      description: "**%player_name%** has joined the server for the first time! 🎉"
      color: "#F1C40F"
      thumbnail: "https://mc-heads.net/avatar/%player_name%/64"

  left:
    embed:
      title: "Player Left"
      description: "**%player_name%** has left the game."
      color: "#E74C3C"
      thumbnail: "https://mc-heads.net/avatar/%player_name%/64"

  death:
    embed:
      description: "%death_message%"
      color: "#8B0000"
      thumbnail: "https://mc-heads.net/avatar/%player_name%/64"

  murder:
    embed:
      title: "Player Killed"
      description: "**%killer_name%** killed **%victim_name%** ⚔️"
      color: "#8B0000"
      thumbnail: "https://mc-heads.net/avatar/%killer_name%/64"

  achivement-unlock:
    embed:
      title: "%advancement_type%: %advancement_title%"
      description: "%advancement_description%"
      color: "#9B59B6"
      thumbnail: "https://mc-heads.net/avatar/%player_name%/64"
      image: "%display_url%"
      footer:
        text: "Unlocked by %player_name%"

custom-death-messages:
  lava: "%death_message% 🔥"
  fire: "%death_message% 🔥"
  fall: "%death_message% 🪂"
  void: "%death_message% 🌌"
  block_explosion: "%death_message% 💣"
  entity_explosion: "%death_message% 💣"
  drowning: "%death_message% 🌊"

server:
  start:
    embed:
      title: "Server Online"
      description: "The server is now online! Gather your friends, start building epic structures, and embark on new adventures. ⛏️"
      color: "#2ECC71"
      fields:
        - name: "Server IP"
          value: "`mc.yourserver.com`"
          inline: true

  stop:
    embed:
      title: "Server Offline"
      description: "The server has shut down. Time to rest, plan new builds, and prepare for future adventures. Thank you for playing! 🛏️"
      color: "#E74C3C"
      fields:
        - name: "Server IP"
          value: "`mc.yourserver.com`"
          inline: true

errors:
  command-error: "An error occurred while executing command: %command_name% by %member_mention%"
  command-registration-error: "An error occurred while registering commands!"
  config-save-error: "There was an error while saving the config"

setup:
  complete:
    embed:
      title: "Setup Complete"
      description: "The server has been configured successfully! A restart will be performed to apply the changes."
      color: "#2ECC71"
      fields:
        - name: "Configuration Files"
          value: "`config.yml` — General settings\n`discord-commands.yml` — Command configuration"
          inline: false
        - name: "Messages"
          value: "`messages.yml` — Customize Discord messages"
          inline: false
        - name: "Help"
          value: "Use `/help` to see the available commands."
          inline: false

  already:
    embed:
      title: "Already Configured"
      description: "The server has already been set up."
      color: "#E74C3C"
      fields:
        - name: "Reconfigure"
          value: "Delete the `bot.yml` file and restart the server to reconfigure."
          inline: false
